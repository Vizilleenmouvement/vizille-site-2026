name: 🏆 Mise en ligne VICTOIRE

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Tapez VICTOIRE pour confirmer'
        required: true
        default: ''

jobs:
  victoire:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'VICTOIRE'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Activer bannières de victoire
        run: cp news.json.VICTOIRE news.json

      - name: Commit et push
        run: |
          git config user.name "Vizille en Mouvement"
          git config user.email "contact@vizilleenmouvement.fr"
          git add news.json
          git commit -m "🏆 Victoire élections municipales 15 mars 2026"
          git push
